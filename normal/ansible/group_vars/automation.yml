n8n_version: "2.28.2"
n8n_workflow_id: "4dDXXTSQZT5Ugq5f"

n8n_encryption_key: "{{ vault_n8n_encryption_key }}"

n8n_owner:
  managed_by_env: true
  email: admin@admin.com
  first_name: admin
  last_name: adminov
  password: "{{ vault_n8n_owner_password }}"

# convenience handles into the shared registry
n8n_db: "{{ databases.n8n }}"
agent_db: "{{ databases.agent }}" # n8n seeds these into credentials.json

# Fixed bcrypt salt (22 chars, bcrypt alphabet) so the owner hash is
# DETERMINISTIC across runs -> compose file is stable -> no needless recreate.
# Not a secret; reused for the single owner account only.
n8n_owner_password_salt: "n8nOwnerSalt0123456789"
n8n_timezone: "Europe/Bratislava"
