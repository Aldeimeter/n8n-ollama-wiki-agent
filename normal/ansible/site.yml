---
- name: Base setup on all hosts
  hosts: all
  become: true
  roles:
    - common

- name: Install docker on app hosts
  hosts: ai:automation:wiki
  become: true
  roles:
    - role: geerlingguy.docker
      docker_users:
        - vagrant

- name: Pre-pull ollama image in the background
  hosts: ai
  become: true
  tasks:
    - name: Ensure Docker SDK for python is present
      ansible.builtin.apt:
        name: python3-docker
        state: present

    - name: Start the ollama image pull (fire and forget)
      community.docker.docker_image_pull:
        name: "ollama/ollama:{{ ollama_version }}"
        timeout: 1800
      async: 1800
      poll: 0
      register: ollama_image_job
      changed_when: false

- name: Postgres
  hosts: db
  become: true
  roles:
    - geerlingguy.postgresql # install + cluster config (runs first)
    - postgres_databases # create roles+DBs from the registry

- name: WikiJS
  hosts: wiki
  become: true
  roles:
    - wikijs

- name: N8N
  hosts: automation
  become: true
  roles:
    - n8n
# keep the last
- name: Ollama
  hosts: ai
  become: true
  roles:
    - ollama
