---
- name: Import n8n credentials
  community.docker.docker_compose_v2_run:
    project_src: /opt/n8n
    service: n8n
    cleanup: true
    argv:
      - "import:credentials"
      - "--input=/credentials.json"
  changed_when: true

- name: Check whether the workflow already exists
  community.docker.docker_compose_v2_run:
    project_src: /opt/n8n
    service: n8n
    cleanup: true
    argv:
      - "export:workflow"
      - "--id={{ n8n_workflow_id }}"
      - "--output=/tmp/wf.json"
  register: n8n_wf_check
  failed_when: false
  changed_when: false

- name: Import workflow (only if missing)
  community.docker.docker_compose_v2_run:
    project_src: /opt/n8n
    service: n8n
    cleanup: true
    argv:
      - "import:workflow"
      - "--input=/workflow.json"
  when: n8n_wf_check.rc != 0
  changed_when: true

- name: Publish workflow (only if just imported)
  community.docker.docker_compose_v2_run:
    project_src: /opt/n8n
    service: n8n
    cleanup: true
    argv:
      - "publish:workflow"
      - "--id={{ n8n_workflow_id }}"
  when: n8n_wf_check.rc != 0
  changed_when: true
