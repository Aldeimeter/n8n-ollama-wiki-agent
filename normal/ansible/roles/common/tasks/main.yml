---
# common: base setup for every host in the stack

- name: Update apt cache (reuse if younger than 1h)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Ensure stack hostnames resolve via /etc/hosts
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE vagrant-stack"
    block: |
      {% for h in groups['all'] %}
      {{ hostvars[h].internal_ip }} {{ h }}
      {% endfor %}
