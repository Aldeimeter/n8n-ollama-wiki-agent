volumes:
  n8n-data:

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-stable}
    restart: unless-stopped
    ports:
      - 5678:5678
    env_file:
      - owner.env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgresql
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASS:?set N8N_DB_PASS}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY}
      N8N_RUNNERS_ENABLED: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      GENERIC_TIMEZONE: ${TZ:-UTC}
      TZ: ${TZ:-UTC}
    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:5678/healthz/readiness || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
